name: Generate Color Convert on PR

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd

    steps:
    - name: Checkout the PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Generate files
      run: |
        lua generate_chains.lua --generate
        lua generate_tests.lua --generate

    - name: Run tests
      run: busted spec/convert/

    - name: Install git, configure, and commit/push if changed
      if: success()                      # only run if tests passed
      run: |
        apk add --no-cache git
        
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add color/convert/ spec/convert/

        if git diff --cached --quiet; then
          echo "No changes detected - nothing to commit"
        else
          git commit -m "chore: update generated color convert modules & tests"
          git push
          echo "Generated files updated and pushed to branch"
        fi