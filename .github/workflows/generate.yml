name: Generate Color Conversions on PR

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    
    - name: Generate Conversion Modules
      run: |
        lua generate_chains.lua --generate
        lua generate_tests.lua --generate
    
    - name: Run Tests
      run: |
        busted spec/conversions/
    
    - name: Upload Generated Files
      uses: actions/upload-artifact@v4
      with:
        name: generated-color-code
        path: |
          color/conversions/
          spec/conversions/

  commit-generated:
    needs: generate-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}
    
    - name: Download Generated Files
      uses: actions/download-artifact@v4
      with:
        name: generated-color-code
        path: .
    
    - name: Commit Generated Files
      run: |
        # Move generated files to correct locations
        mv generated-color-code/color/conversions/* color/conversions/ 2>/dev/null || true
        mv generated-color-code/spec/conversions/* spec/conversions/ 2>/dev/null || true
        git add color/conversions/ spec/conversions/
        if ! git diff --cached --quiet; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update generated color conversion modules and tests"
          git push origin ${{ github.head_ref }}
        else
          echo "No changes in generated code - skipping commit"
        fi