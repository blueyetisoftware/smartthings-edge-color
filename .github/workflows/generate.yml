name: Verify Generated Files

on:
  pull_request:
    branches: [main]
    paths:
      - 'generate_chains.lua'
      - 'generate_tests.lua'
      - 'color/core/**'
      - 'color/format/**'
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          clean: true

      - run: |
          # Backup originals
          mkdir -p /tmp/orig
          cp -r color/convert/* /tmp/orig/ 2>/dev/null || true
          cp -r spec/convert/*   /tmp/orig/   2>/dev/null || true

          # Regenerate
          lua generate_chains.lua --generate
          lua generate_tests.lua --generate

          # Trim trailing whitespace + ensure EOF newline
          find color/convert spec/convert /tmp/orig -type f -name "*.lua" -exec \
            sed -i 's/[ \t]*$//' {} \; -exec sed -i '$a\' {} \; || true

          # Compare
          fail=false
          for f in /tmp/orig/*.lua; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            regen=""
            [[ $f == /tmp/orig/color* ]] && regen="color/convert/$base" || regen="spec/convert/$base"
            [ -f "$regen" ] || { fail=true; echo "Missing $regen"; continue; }
            cmp -s "$f" "$regen" || { fail=true; echo "Diff in $base"; }
          done

          [ "$fail" = true ] && { echo "Files differ after normalization"; exit 1; } || echo "OK ✓"