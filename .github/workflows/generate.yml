name: Verify Generated Color Conversions

on:
  pull_request:
    branches: [main]
    paths:
      - 'generate_chains.lua'
      - 'generate_tests.lua'
      - 'color/core/**'
      - 'color/format/**'
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-generated:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd

    steps:
      - name: Checkout PR branch (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          clean: true

      - name: Install git
        run: apk add --no-cache git

      - name: Regenerate files and verify
        run: |
          echo "Running generators..."
          lua generate_chains.lua --generate
          lua generate_tests.lua --generate

          echo ""
          echo "Post-regeneration file check:"
          echo " - color/convert/ contents:"
          ls -la color/convert/ | head -n 15 || true
          echo ""
          echo " - spec/convert/ contents:"
          ls -la spec/convert/ | head -n 15 || true

          echo ""
          echo "Sample regenerated file size (rgb_cct_spec.lua):"
          wc -c spec/convert/rgb_cct_spec.lua || true

          echo ""
          echo "Checking for differences (ignoring whitespace/line endings)..."

          if git diff --quiet --ignore-all-space --ignore-cr-at-eol --ignore-space-change --ignore-space-at-eol -- color/convert/ spec/convert/; then
            echo "Generated files are up-to-date ✓"
            echo "(Any visible differences are only harmless whitespace or line-ending variations)"
          else
            echo ""
            echo "╔═══════════════════════════════════════════════════════════════╗"
            echo "║     GENERATED FILES HAVE REAL (non-whitespace) DIFFERENCES    ║"
            echo "╚═══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "Even ignoring whitespace, line endings, and space changes, differences exist."
            echo "Likely causes: different Lua version output, float formatting, or logic variation."
            echo ""
            echo "Files with changes:"
            git diff --name-only -- color/convert/ spec/convert/ || true
            echo ""
            echo "Strict diff summary:"
            git diff --stat -- color/convert/ spec/convert/ || true
            echo ""
            echo "Whitespace-ignoring summary (for debugging):"
            git diff --ignore-all-space --ignore-cr-at-eol --stat -- color/convert/ spec/convert/ || echo "No meaningful diff when ignoring whitespace"
            exit 1
          fi

      - name: Run conversion tests
        run: busted spec/convert/