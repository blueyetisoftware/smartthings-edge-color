name: Verify Generated Color Conversions

on:
  pull_request:
    branches: [main]
    paths:
      - 'generate_chains.lua'
      - 'generate_tests.lua'
      - 'color/core/**'
      - 'color/format/**'
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-generated:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd

    steps:
      - name: Checkout PR branch (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0          # Critical: full clone to avoid incomplete working tree
          clean: true             # Ensures no leftover files

      - name: Install git
        run: apk add --no-cache git

      # Diagnostic - keep for 1-2 runs to confirm fix, then remove or comment out
      - name: Show state before generation
        run: |
          echo "=== Git status on checkout ==="
          git status --short color/convert/ spec/convert/ || true

          echo ""
          echo "=== Directory listing ==="
          du -sh color/convert/ spec/convert/ 2>/dev/null || true
          ls -la color/convert/ spec/convert/ 2>/dev/null | head -n 20 || true

          echo ""
          echo "=== Sample file contents ==="
          for file in color/convert/rgb_cct.lua spec/convert/rgb_cct_spec.lua; do
            echo "→ $file"
            head -n 8 "$file" 2>/dev/null || echo "  (not found)"
            echo ""
          done

          echo ""
          echo "=== Committed files count in these dirs ==="
          git ls-tree -r HEAD --name-only color/convert/ spec/convert/ | wc -l || echo "ls-tree failed"

      - name: Regenerate files and verify
        run: |
          echo "Running generators..."
          lua generate_chains.lua --generate
          lua generate_tests.lua --generate

          echo ""
          echo "Checking diff..."

          if git diff --quiet -- color/convert/ spec/convert/; then
            echo "Generated files match committed versions exactly ✓"
          elif git diff --quiet --ignore-cr-at-eol --ignore-space-at-eol --ignore-all-space -- color/convert/ spec/convert/; then
            echo "Files match (ignoring whitespace/line endings) → up-to-date"
          else
            echo ""
            echo "╔═══════════════════════════════════════════════════════════════╗"
            echo "║          GENERATED FILES OUT OF DATE                          ║"
            echo "╚═══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "Files affected:"
            git diff --name-only -- color/convert/ spec/convert/ || true
            echo ""
            echo "Change summary:"
            git diff --stat -- color/convert/ spec/convert/
            exit 1
          fi

      - name: Run conversion tests
        run: busted spec/convert/