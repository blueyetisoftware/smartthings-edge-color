name: Generate Color Conversions on PR

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}
    
    - name: Install Git
      run: |
        apk update && apk add --no-cache git
    
    - name: Generate Conversion Modules
      run: |
        lua generate_chains.lua --generate
        lua generate_tests.lua --generate
    
    - name: Run Tests
      run: |
        busted spec/conversions/
    
    - name: Commit Generated Files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'Update generated color conversion modules and tests'
        file_pattern: 'color/conversions/ spec/conversions/'