name: Generate Color Conversions on PR

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    
    - name: Generate Conversion Modules
      run: |
        lua generate_chains.lua --generate
        lua generate_tests.lua --generate
    
    - name: Run Tests
      run: |
        busted spec/conversions/
    
    - name: Upload Generated Files
      uses: actions/upload-artifact@v4
      with:
        name: color-conversions
        path: color/conversions/
    
    - name: Upload Generated Test Files
      uses: actions/upload-artifact@v4
      with:
        name: spec-conversions
        path: spec/conversions/

  commit-generated:
    needs: generate-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}
    
    - name: Download Generated Files
      uses: actions/download-artifact@v4
      with:
        name: color-conversions
        path: color
    
    - name: Download Generated Test Files
      uses: actions/download-artifact@v4
      with:
        name: spec-conversions
        path: spec
    
    - name: Debug File Status
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo "=== Color conversions ==="
        ls -la color/conversions/
        echo "=== Spec conversions ==="
        ls -la spec/conversions/
        echo "=== Git status ==="
        git status --porcelain
    
    - name: Commit Generated Files
      run: |
        echo "=== Checking for changes ==="
        git status --porcelain
        echo "=== Adding files ==="
        git add -f color/conversions/ spec/conversions/
        echo "=== Checking staged changes ==="
        git diff --cached --name-only
        if ! git diff --cached --quiet; then
          echo "=== Committing changes ==="
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update generated color conversion modules and tests"
          git push origin ${{ github.head_ref }}
          echo "=== Commit successful ==="
        else
          echo "=== No changes to commit ==="
        fi  # Force add ignored files