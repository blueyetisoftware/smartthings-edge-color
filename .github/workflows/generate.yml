name: Generate Color Conversions on PR

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    
    - name: Generate Conversion Modules
      run: |
        lua generate_chains.lua --generate
        lua generate_tests.lua --generate
    
    - name: Run Tests
      run: |
        busted spec/conversions/
    
    - name: Upload Generated Files
      uses: actions/upload-artifact@v4
      with:
        name: color-conversions
        path: color/conversions/
    
    - name: Upload Generated Test Files
      uses: actions/upload-artifact@v4
      with:
        name: spec-conversions
        path: spec/conversions/

  commit-generated:
    needs: generate-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}
    
    - name: Download Generated Files
      uses: actions/download-artifact@v4
      with:
        name: color-conversions
        path: .
    
    - name: Download Generated Test Files
      uses: actions/download-artifact@v4
      with:
        name: spec-conversions
        path: .
    
    - name: Commit Generated Files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'Update generated color conversion modules and tests'
        file_pattern: 'color/conversions/ spec/conversions/'
        add_options: '-f'  # Force add ignored files