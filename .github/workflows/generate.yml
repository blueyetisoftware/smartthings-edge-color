name: Generate Color Conversions on PR

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    
    - name: Generate Conversion Modules
      run: |
        lua generate_chains.lua --generate
        lua generate_tests.lua --generate
    
    - name: Run Tests
      run: |
        busted spec/conversions/
    
    - name: Upload Generated Files
      uses: actions/upload-artifact@v4
      with:
        name: color-conversions
        path: color/conversions
    
    - name: Upload Generated Test Files
      uses: actions/upload-artifact@v4
      with:
        name: spec-conversions
        path: spec/conversions

  commit-generated:
    needs: generate-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}
    
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    
    - name: Download Generated Files
      uses: actions/download-artifact@v4
      with:
        name: color-conversions
        path: color/conversions
    
    - name: Download Generated Test Files
      uses: actions/download-artifact@v4
      with:
        name: spec-conversions
        path: spec/conversions
    
    - name: Verify Downloaded Files
      run: |
        echo "=== Complete directory structure ==="
        find . -type f | sort
    
    - name: Commit Generated Files
      run: |
        git add color/conversions/ spec/conversions/
        git commit -m "Update generated color conversion modules and tests" || echo "No changes to commit"
        git push  # Force add ignored files