name: Verify Generated Color Conversions

on:
  pull_request:
    branches: [main]
    paths:
      - 'generate_chains.lua'
      - 'generate_tests.lua'
      - 'color/core/**'
      - 'color/format/**'
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-generated:
    runs-on: ubuntu-latest
    container: ghcr.io/blueyetisoftware/smartthings-edge-sdk-runtime:16.0.59-51ac4bd

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          clean: true

      - name: Regenerate and verify (non-git file comparison)
        run: |
          echo "=== Step 1: Backup committed (checked-out) versions ==="
          mkdir -p /tmp/original/color/convert /tmp/original/spec/convert

          cp -r color/convert/* /tmp/original/color/convert/ 2>/dev/null || true
          cp -r spec/convert/*   /tmp/original/spec/convert/   2>/dev/null || true

          echo "Backup complete. Original files in /tmp/original/"
          ls -la /tmp/original/color/convert/ | head -n 10 || true
          ls -la /tmp/original/spec/convert/   | head -n 10 || true

          echo ""
          echo "=== Step 2: Run generators (overwrites working files) ==="
          lua generate_chains.lua --generate
          lua generate_tests.lua --generate

          echo ""
          echo "=== Step 3: Normalize both original and regenerated files ==="
          echo "(trim trailing whitespace, ensure LF endings, add EOF newline if missing)"

          normalize() {
            local dir="$1"
            find "$dir" -type f -name "*.lua" -exec \
              sed -i 's/[ \t]*$//' {} \; -exec \
              sed -i '$a\' {} \; \
              || true
          }

          normalize color/convert
          normalize spec/convert
          normalize /tmp/original/color/convert
          normalize /tmp/original/spec/convert

          echo ""
          echo "=== Step 4: Compare original vs regenerated (ignoring whitespace variations) ==="

          DIFF_FOUND=false

          check_dir() {
            local orig_dir="$1"
            local regen_dir="$2"
            local label="$3"

            for orig_file in "$orig_dir"/*.lua; do
              if [ -f "$orig_file" ]; then
                base=$(basename "$orig_file")
                regen_file="$regen_dir/$base"

                if [ -f "$regen_file" ]; then
                  if ! diff -w -B -Z -q "$orig_file" "$regen_file" >/dev/null 2>&1; then
                    echo "→ Difference detected in $label/$base (beyond whitespace)"
                    DIFF_FOUND=true
                    # Show brief context of the difference
                    echo "First 20 lines of diff:"
                    diff -w -B -Z --color=always "$orig_file" "$regen_file" | head -n 30 || true
                    echo ""
                  fi
                else
                  echo "→ Regenerated file missing: $regen_file"
                  DIFF_FOUND=true
                fi
              fi
            done
          }

          check_dir /tmp/original/color/convert color/convert "color/convert"
          check_dir /tmp/original/spec/convert spec/convert "spec/convert"

          if [ "$DIFF_FOUND" = true ]; then
            echo ""
            echo "╔═══════════════════════════════════════════════════════════════╗"
            echo "║               REAL CONTENT DIFFERENCES DETECTED               ║"
            echo "╚═══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "The regenerated files differ from the committed versions"
            echo "even after normalizing whitespace and line endings."
            echo ""
            echo "Likely causes:"
            echo "  - Float/number formatting differences (Lua version or env)"
            echo "  - Subtle string concatenation or table serialization"
            echo "  - Missing/extra comments, empty lines, or tokens"
            echo ""
            echo "Suggestion: Regenerate inside the container locally (docker run) and commit those versions."
            exit 1
          else
            echo "All generated files match the committed versions ✓"
            echo "(ignoring whitespace, trailing spaces, blank lines, and line-ending variations)"
          fi

      - name: Run conversion tests
        run: busted spec/convert/